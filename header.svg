<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="860" height="280">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="60%" stop-color="#0d0620"/>
      <stop offset="100%" stop-color="#050210"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1493" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF1493" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="280" fill="url(#bg)" rx="12"/>

  <!-- Soft glow blobs -->
  <ellipse cx="200" cy="140" rx="180" ry="120" fill="url(#glow1)"/>
  <ellipse cx="660" cy="140" rx="180" ry="120" fill="url(#glow2)"/>
  <ellipse cx="430" cy="140" rx="120" ry="90" fill="#FF1493" fill-opacity="0.07"/>

  <!-- Decorative dots scattered -->
  <circle cx="80" cy="50" r="2" fill="#FF1493" opacity="0.7"/>
  <circle cx="150" cy="30" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="50" cy="180" r="1.5" fill="#FFD700" opacity="0.5"/>
  <circle cx="120" cy="220" r="2" fill="#FF1493" opacity="0.5"/>
  <circle cx="30" cy="120" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="200" cy="250" r="1.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="760" cy="40" r="2" fill="#FF1493" opacity="0.6"/>
  <circle cx="820" cy="80" r="1.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="800" cy="200" r="2" fill="#FF1493" opacity="0.5"/>
  <circle cx="740" cy="240" r="1.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="840" cy="150" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="680" cy="260" r="1.5" fill="#FF1493" opacity="0.4"/>
  <circle cx="350" cy="25" r="1.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="510" cy="255" r="1.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="260" cy="60" r="1" fill="#FF1493" opacity="0.5"/>
  <circle cx="600" cy="35" r="1" fill="#FFD700" opacity="0.5"/>

  <!-- Small decorative stars (4-pointed sparkles) -->
  <!-- sparkle top-left -->
  <g transform="translate(95, 85)" opacity="0.8">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#FF1493" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#FF1493" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#FF1493" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#FF1493" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <!-- sparkle top-right -->
  <g transform="translate(765, 95)" opacity="0.8">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#FFD700" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#FFD700" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <!-- sparkle bottom-left small -->
  <g transform="translate(170, 195)" opacity="0.6">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- sparkle bottom-right small -->
  <g transform="translate(690, 190)" opacity="0.6">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#FF1493" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#FF1493" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- tiny sparkle top center -->
  <g transform="translate(430, 32)" opacity="0.5">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Small 4-petal flowers -->
  <!-- flower left -->
  <g transform="translate(58, 140)">
    <ellipse cx="0" cy="-8" rx="4" ry="6" fill="#FF1493" opacity="0.7"/>
    <ellipse cx="0" cy="8" rx="4" ry="6" fill="#FF1493" opacity="0.7"/>
    <ellipse cx="-8" cy="0" rx="6" ry="4" fill="#FF1493" opacity="0.7"/>
    <ellipse cx="8" cy="0" rx="6" ry="4" fill="#FF1493" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#FFD700" opacity="0.9"/>
  </g>
  <!-- flower right -->
  <g transform="translate(802, 140)">
    <ellipse cx="0" cy="-8" rx="4" ry="6" fill="#FFD700" opacity="0.7"/>
    <ellipse cx="0" cy="8" rx="4" ry="6" fill="#FFD700" opacity="0.7"/>
    <ellipse cx="-8" cy="0" rx="6" ry="4" fill="#FFD700" opacity="0.7"/>
    <ellipse cx="8" cy="0" rx="6" ry="4" fill="#FFD700" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#FF1493" opacity="0.9"/>
  </g>
  <!-- small flower top-left -->
  <g transform="translate(300, 45)">
    <ellipse cx="0" cy="-5" rx="3" ry="4" fill="#FF1493" opacity="0.5"/>
    <ellipse cx="0" cy="5" rx="3" ry="4" fill="#FF1493" opacity="0.5"/>
    <ellipse cx="-5" cy="0" rx="4" ry="3" fill="#FF1493" opacity="0.5"/>
    <ellipse cx="5" cy="0" rx="4" ry="3" fill="#FF1493" opacity="0.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFD700" opacity="0.8"/>
  </g>
  <!-- small flower bottom-right -->
  <g transform="translate(560, 240)">
    <ellipse cx="0" cy="-5" rx="3" ry="4" fill="#FFD700" opacity="0.5"/>
    <ellipse cx="0" cy="5" rx="3" ry="4" fill="#FFD700" opacity="0.5"/>
    <ellipse cx="-5" cy="0" rx="4" ry="3" fill="#FFD700" opacity="0.5"/>
    <ellipse cx="5" cy="0" rx="4" ry="3" fill="#FFD700" opacity="0.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#FF1493" opacity="0.8"/>
  </g>

  <!-- Diamond shapes -->
  <polygon points="430,195 436,202 430,209 424,202" fill="none" stroke="#FF1493" stroke-width="1.2" opacity="0.6"/>
  <polygon points="140,145 144,150 140,155 136,150" fill="#FFD700" opacity="0.4"/>
  <polygon points="720,145 724,150 720,155 716,150" fill="#FF1493" opacity="0.4"/>

  <!-- Subtitle text -->
  <text x="430" y="108" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="5" fill="#FF1493" opacity="0.85">HI, I'M</text>

  <!-- Main title -->
  <text x="430" y="163" text-anchor="middle" font-family="'Segoe UI', Georgia, serif" font-size="58" font-weight="700" letter-spacing="2" fill="#ffffff">dakeiyuu</text>

  <!-- Divider line with dots -->
  <line x1="270" y1="180" x2="380" y2="180" stroke="#FF1493" stroke-width="0.8" opacity="0.5"/>
  <circle cx="430" cy="180" r="2.5" fill="#FF1493" opacity="0.7"/>
  <line x1="480" y1="180" x2="590" y2="180" stroke="#FF1493" stroke-width="0.8" opacity="0.5"/>

  <!-- Description -->
  <text x="430" y="210" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="3" fill="#FFD700" opacity="0.75">backend · android · design</text>
</svg>
